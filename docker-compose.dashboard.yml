services:
  hml-dashboard:
    build: .
    image: mysql-hml-dashboard:latest
    container_name: hml-dashboard
    restart: unless-stopped
    command: python3 dashboard.py
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    environment:
      DASHBOARD_PORT: "8080"
      # Comma-separated list of agents: "server1=http://192.168.1.10:8766,server2=http://192.168.1.11:8766"
      # Or leave empty and mount agents.json
      AGENTS: "${AGENTS:-local=http://host.docker.internal:8766}"
    volumes:
      # Optional: mount agents.json for static config
      - "${AGENTS_CONFIG:-/dev/null}:/app/agents.json:ro"
    networks:
      - hml-dashboard-net

networks:
  hml-dashboard-net:
    driver: bridge
