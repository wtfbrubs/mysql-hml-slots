name: HML Slots — Expirar (agendado)

on:
  schedule:
    - cron: '0 1 * * *'   # diariamente à 01:00 UTC
  workflow_dispatch:       # permite disparo manual

jobs:
  expire:
    name: Expirar slots vencidos
    runs-on: ubuntu-latest
    steps:
      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Expirar slots no host HML
        id: ssm
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.HML_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /opt/mysql-hml-slots && make expire"]' \
            --comment "scheduled-expire" \
            --query 'Command.CommandId' \
            --output text)
          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Aguardar conclusão
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.cmd_id }}" \
            --instance-id "${{ secrets.HML_INSTANCE_ID }}"

      - name: Exibir output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.cmd_id }}" \
            --instance-id "${{ secrets.HML_INSTANCE_ID }}" \
            --query 'StandardOutputContent' \
            --output text
